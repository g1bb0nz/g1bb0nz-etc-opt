# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 4
shell_integration: true
patch_pwsh_bleed: true
final_space: true
console_title_template: |-
  {{ if .Root -}}
    # {{- " " }}
  {{- end -}}
  {{ .UserName -}} @ {{- .HostName -}} :
  {{- if eq .PWD "~" -}}
    ~
  {{- else -}}
    {{ .Folder }}
  {{- end }}
palette:
  colorA: '#2f2f2f'
  colorB: '#3d3d3d'
blocks:
  # 1st line left
  - type: prompt
    alignment: left
    segments:
      - type: session
        style: powerline
        leading_powerline_symbol: 
        background: darkGray
        template: |-
          {{ if .Root -}}
            <red>
          {{- else if .SSHSession -}}
            <green>
          {{- else -}}
            <green>
          {{- end -}}
          {{ " " -}} <b> {{- .UserName -}} </b></>@ {{- .HostName }}
        cache: { strategy: session, duration: 168h }
      - type: os
        options:
          windows: 
        style: powerline
        powerline_symbol: 
        foreground: black
        background: blue
        template: |-
          {{ if .WSL -}}
             {{- " " }}
          {{- end -}}
          {{ .Icon }} {{- " " }}
        cache: { strategy: session, duration: 168h }
      - type: path
        options:
          style: agnoster_full
        style: powerline
        powerline_symbol: 
        foreground: black
        background: yellow
        template:  {{ path .Path .Location }}
      - type: git
        options:
          fetch_stash_count: true
          fetch_status: true
          fetch_upstream_icon: true
          fetch_worktree_count: true
        style: powerline
        powerline_symbol: 
        foreground_templates:
          - |-
            {{ if or .Working.Changed .Staging.Changed -}}
              lightYellow
            {{- end }}
          - |-
            {{ if lt 0 .Behind -}}
              lightCyan
            {{- end }}
          - |-
            {{ if lt 0 .Ahead -}}
              lightMagenta
            {{- end }}
        background: p:colorA
        template: |-
          {{ .UpstreamIcon }} {{ .HEAD }} {{ .BranchStatus }}
          {{- if .Working.Changed -}}
            {{ " " -}}  <lightRed> {{- .Working.String -}} </>
          {{- end }}
          {{- if and .Working.Changed .Staging.Changed -}}
            {{ " " -}} |
          {{- end }}
          {{- if .Staging.Changed -}}
            {{ " " -}}  <lightGreen> {{- .Staging.String -}} </>
          {{- end }}
          {{- if lt 0 .StashCount -}}
            {{ " " -}}  {{ .StashCount }}
          {{- end }}
          {{- if lt 0 .WorktreeCount -}}
            {{ " " -}}  {{ .WorktreeCount }}
          {{- end }}
  # 1st line right
  - type: prompt
    alignment: right
    overflow: hide
    segments:
      - type: mvn
        options:
          display_mode: always
          home_enabled: true
        style: accordion
        leading_powerline_symbol: 
        foreground: default
        background: p:colorA
        template: |-
          {{ if not .Error -}}
            <#f79a24></> mvn {{ url .Full .URL }}
          {{- else if ne .Error "NO VERSION" -}}
            {{ .Error }}
          {{- end }}
      - type: java
        options:
          display_mode: always
          home_enabled: true
          version_url_template: |-
            {{ if lt 1 (.Major | int) -}}
              https://www.oracle.com/java/technologies/javase/ {{- .Full | replace "." "-" -}} -relnotes.html
            {{- else -}}
              https://www.oracle.com/java/technologies/javase/ {{- .Minor -}} u-relnotes.html
            {{- end }}
        style: accordion
        powerline_symbol: 
        foreground: default
        background: p:colorB
        template: |-
          {{ if not .Error -}}
            <#5283a2> </>
            {{- if .Env.JAVA_HOME -}}
              {{ path "jdk" .Env.JAVA_HOME }}
            {{- else -}}
              jdk
            {{- end -}}
            {{ " " -}} {{ url .Full .URL }}
          {{- else if ne .Error "NO VERSION" -}}
            {{ .Error }}
          {{- end }}
      - type: docker
        style: accordion
        powerline_symbol: 
        foreground: default
        background: p:colorA
        template: <#1d63ed></> docker[<lightRed> {{- .Context -}} </>]
      - type: node
        options:
          display_mode: always
          home_enabled: true
        style: accordion
        powerline_symbol: 
        foreground: default
        background: p:colorB
        template: |-
          {{ if not .Error -}}
            <#539e43></> node {{ url .Full .URL }}
          {{- else if ne .Error "NO VERSION" -}}
            {{ .Error }}
          {{- end }}
      - type: python
        options:
          display_mode: always
          home_enabled: true
        style: accordion
        powerline_symbol: 
        foreground: default
        background: p:colorA
        template: |-
          {{ if not .Error -}}
            <#f7c639></> py
          {{- if .Venv -}}
            [<lightGreen> {{- .Venv -}} </>]
          {{- end -}}
          {{ " " -}} {{ url .Full .URL }}
          {{- else if ne .Error "NO VERSION" -}}
            {{ .Error }}
          {{- end }}
      - type: upgrade
        options:
          cache_duration: 12h
        style: powerline
        powerline_symbol: 
        foreground: default
        background: p:colorB
        template: <white></> omp {{ .Current }} <lightGreen> {{ .Latest -}} </>
      - type: shell
        style: powerline
        powerline_symbol: 
        foreground: black
        background: blue
        template:  {{ .Name }}
        cache: { strategy: session, duration: 168h }
      - type: time
        style: powerline
        powerline_symbol: 
        background: darkGray
        template:  {{ .CurrentDate | date .Format }}
  # 2nd line left
  - type: prompt
    newline: true
    alignment: left
    segments:
      - type: text
        style: plain
        template: |-
          {{ if .Root -}}
            <red>#
          {{- else -}}
            <green>$
          {{- end -}}
          </>
        cache: { strategy: session, duration: 168h }
  # 2nd line right
  - type: rprompt
    segments:
      - type: executiontime
        style: plain
        template: <red> </>  {{ .FormattedMs }} <red> </> {{- " " }}
      - type: status
        options:
          always_enabled: true
        style: plain
        template: |-
           {{- " " }}
          {{- if .Error -}}
            <red>
          {{- else -}}
            <green>
          {{- end -}}
          </> {{ .String }}
